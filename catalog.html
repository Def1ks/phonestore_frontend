<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneStore</title>
    <link rel="stylesheet" href="styles/fonts.css">
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/responsive.css">
    <script src="js/main.js" defer></script>
    <script src="js/catalog.js" defer type="module"></script>
</head>

<body>
    <header class="header">
        <a href="index.html" class="header__logo">
            PHONE<span>store</span>
        </a>
        <nav class="header__nav">
            <ul class="header__nav-list">
                <li><a href="index.html" class="header__nav-link">Главная</a></li>
                <li><a href="catalog.html" class="header__nav-link header__nav-link--active">Каталог</a></li>
                <li><a href="about_us.html" class="header__nav-link">О магазине</a></li>
                <li><a href="reviews.html" class="header__nav-link">Отзывы</a></li>
            </ul>
        </nav>
        <div class="header__icons">
            <a href="cart.html" class="header__icon">
                <svg class="header__icon-image" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                    stroke-width="1.5">
                    <rect height="9.5" width="10.5" y="4.75" x="2.75" />
                    <path d="m5.75 7.75c0 1.5 1 2.5 2.25 2.5s2.25-1 2.25-2.5m-7.5-3 1.5-3h7.5l1.5 3" />
                </svg>
            </a>
            <a href="profile.html" class="header__icon">
                <svg class="header__icon-image" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                    stroke-width="1.5">
                    <circle cx="8" cy="6" r="3.25" />
                    <path d="m2.75 14.25c0-2.5 2-5 5.25-5s5.25 2.5 5.25 5" />
                </svg>
            </a>
        </div>
        <button class="header__burger" aria-label="Меню">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="header__mobile-menu">
            <nav class="header__mobile-nav">
                <ul class="header__mobile-nav-list">
                    <li><a href="index.html" class="header__mobile-nav-link">Главная</a>
                    </li>
                    <li><a href="catalog.html"
                            class="header__mobile-nav-link header__mobile-nav-link--active">Каталог</a></li>
                    <li><a href="about_us.html" class="header__mobile-nav-link">О магазине</a></li>
                    <li><a href="reviews.html" class="header__mobile-nav-link">Отзывы</a></li>
                    <li><a href="cart.html" class="header__mobile-nav-link">Корзина</a></li>
                    <li><a href="profile.html" class="header__mobile-nav-link">Профиль</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <section class="catalog">
            <div class="catalog__container">
                <div class="catalog__header">
                    <div class="catalog__title-block">
                        <h1 class="catalog__title">Каталог</h1>
                        <p class="catalog__count">0 товаров</p>
                    </div>
                    <button class="catalog__filters-toggle" type="button" aria-expanded="false"
                        aria-controls="catalog-filters">
                        <svg class="catalog__filters-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M3 5h14M6 10h8M9 15h2" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" />
                        </svg>
                        <span class="catalog__filters-text">Фильтры</span>
                    </button>
                </div>
                <!-- Фильтры -->
                <div class="catalog__filters" id="catalog-filters">
                    <button class="catalog__filters-close" type="button" aria-label="Закрыть фильтры">
                        &times;
                    </button>
                    <div class="filters">
                        <!-- БРЕНД -->
                        <div class="filters__group" data-type="brand">
                            <h3 class="filters__title">БРЕНД</h3>
                            <div class="filters__tags">
                            </div>
                        </div>
                        <div class="filters__group" data-type="ram">
                            <h3 class="filters__title">ОЗУ</h3>
                            <div class="filters__tags">
                            </div>
                        </div>
                        <div class="filters__group" data-type="storage">
                            <h3 class="filters__title">ПАМЯТЬ</h3>
                            <div class="filters__tags">
                            </div>
                        </div>
                        <!-- ЦВЕТ -->
                        <div class="filters__group" data-type="color">
                            <h3 class="filters__title">ЦВЕТ</h3>
                            <div class="filters__tags">
                            </div>
                        </div>
                        <!-- ЦЕНА ( -->
                        <div class="filters__group">
                            <h3 class="filters__title">ЦЕНА, ₽</h3>
                            <div class="filters__price">
                                <div class="filters__price-inputs">
                                    <div class="filters__price-field">
                                        <label class="filters__price-label">От</label>
                                        <input type="number" class="filters__price-input" value="0" min="0">
                                    </div>
                                    <div class="filters__price-field">
                                        <label class="filters__price-label">До</label>
                                        <input type="number" class="filters__price-input" value="150000" min="0">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="filters__actions">
                            <button class="filters__apply-btn" type="button">Применить фильтры</button>
                        </div>
                    </div>
                </div>
                <!-- Сортировочный список -->
                <div class="catalog__sort">
                    <select class="catalog__select">
                        <option value="default">По умолчанию</option>
                        <option value="price-asc">Сначала дешевые</option>
                        <option value="price-desc">Сначала дорогие</option>
                    </select>
                </div>
                <div class="catalog__grid">

                </div>
            </div>
        </section>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer__content">
                <div class="footer__logo">
                    PHONE<span>store</span>
                </div>
                <p class="footer__copyright">
                    © 2026 Phone Store. Все права защищены.
                </p>
                <div class="footer__inn">
                    ИНН 1234567890
                </div>
            </div>
        </div>
    </footer>
</body>

</html>
