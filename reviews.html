<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneStore</title>
    <link rel="stylesheet" href="styles/fonts.css">
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/responsive.css">
    <script src="js/main.js" defer></script>
    <script src="js/reviews.js" defer type="module"></script>
</head>

<body>
    <header class="header">
        <a href="index.html" class="header__logo">
            PHONE<span>store</span>
        </a>
        <nav class="header__nav">
            <ul class="header__nav-list">
                <li><a href="index.html" class="header__nav-link">Главная</a></li>
                <li><a href="catalog.html" class="header__nav-link">Каталог</a></li>
                <li><a href="about_us.html" class="header__nav-link">О магазине</a></li>
                <li><a href="reviews.html" class="header__nav-link header__nav-link--active">Отзывы</a></li>
            </ul>
        </nav>
        <div class="header__icons">
            <a href="cart.html" class="header__icon">
                <svg class="header__icon-image" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                    stroke-width="1.5">
                    <rect height="9.5" width="10.5" y="4.75" x="2.75" />
                    <path d="m5.75 7.75c0 1.5 1 2.5 2.25 2.5s2.25-1 2.25-2.5m-7.5-3 1.5-3h7.5l1.5 3" />
                </svg>
            </a>
            <a href="profile.html" class="header__icon">
                <svg class="header__icon-image" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                    stroke-width="1.5">
                    <circle cx="8" cy="6" r="3.25" />
                    <path d="m2.75 14.25c0-2.5 2-5 5.25-5s5.25 2.5 5.25 5" />
                </svg>
            </a>
        </div>
        <button class="header__burger" aria-label="Меню">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="header__mobile-menu">
            <nav class="header__mobile-nav">
                <ul class="header__mobile-nav-list">
                    <li><a href="index.html" class="header__mobile-nav-link">Главная</a>
                    </li>
                    <li><a href="catalog.html" class="header__mobile-nav-link">Каталог</a></li>
                    <li><a href="about_us.html" class="header__mobile-nav-link">О магазине</a></li>
                    <li><a href="reviews.html"
                            class="header__mobile-nav-link header__mobile-nav-link--active">Отзывы</a></li>
                    <li><a href="cart.html" class="header__mobile-nav-link">Корзина</a></li>
                    <li><a href="profile.html" class="header__mobile-nav-link">Профиль</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <section class="reviews">
            <div class="container">
                <div class="reviews__header">
                    <div class="reviews__title-block">
                        <span class="reviews__label">ОТЗЫВЫ</span>
                        <h1 class="reviews__title">Что говорят покупатели</h1>
                    </div>
                    <div class="reviews__rating">
                        <div class="reviews__rating-value">0.0</div>
                        <div class="reviews__rating-stars">
                            ★★★★★
                        </div>
                        <div class="reviews__rating-count">0 отзывов</div>
                    </div>
                </div>
                <div class="reviews__grid">   
                </div>
                <!-- Кнопка загрузки -->
                <div class="reviews__load-more">
                    <button class="reviews__btn" id="loadMoreBtn">
                        Загрузить еще отзывы
                    </button>
                </div>

                <!-- Форма оставления отзыва -->
                <div class="review-form">
                    <div class="review-form__container">
                        <h2 class="review-form__title">Оставить отзыв</h2>

                        <form class="review-form__form" id="reviewForm">
                            <!-- Рейтинг -->
                            <div class="review-form__group">
                                <label class="review-form__label">Ваша оценка</label>
                                <div class="review-form__rating" id="starRating">
                                    <input type="radio" name="rating" value="1" id="star1"
                                        class="review-form__star-input">
                                    <label for="star1" class="review-form__star" title="1 звезда">★</label>

                                    <input type="radio" name="rating" value="2" id="star2"
                                        class="review-form__star-input">
                                    <label for="star2" class="review-form__star" title="2 звезды">★</label>

                                    <input type="radio" name="rating" value="3" id="star3"
                                        class="review-form__star-input">
                                    <label for="star3" class="review-form__star" title="3 звезды">★</label>

                                    <input type="radio" name="rating" value="4" id="star4"
                                        class="review-form__star-input">
                                    <label for="star4" class="review-form__star" title="4 звезды">★</label>

                                    <input type="radio" name="rating" value="5" id="star5"
                                        class="review-form__star-input">
                                    <label for="star5" class="review-form__star" title="5 звезд">★</label>
                                </div>
                            </div>

                            <!-- Имя -->
                            <div class="review-form__group">
                                <label class="review-form__label" for="userName">Ваше имя</label>
                                <input type="text" id="userName" name="userName" class="review-form__input"
                                    placeholder="Иван Иванов" required>
                            </div>

                            <!-- Отзыв -->
                            <div class="review-form__group">
                                <label class="review-form__label" for="userReview">Ваш отзыв</label>
                                <textarea id="userReview" name="userReview" class="review-form__textarea"
                                    placeholder="Расскажите о вашем опыте покупок..." rows="5" required></textarea>
                            </div>

                            <!-- Кнопка -->
                            <button type="submit" class="review-form__submit">
                                Отправить отзыв
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer__content">
                <div class="footer__logo">
                    PHONE<span>store</span>
                </div>
                <p class="footer__copyright">
                    © 2026 Phone Store. Все права защищены.
                </p>
                <div class="footer__inn">
                    ИНН 1234567890
                </div>
            </div>
        </div>
    </footer>
</body>

</html>
